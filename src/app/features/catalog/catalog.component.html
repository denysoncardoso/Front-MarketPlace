<app-page-header title="Catálogo de Produtos" subtitle="Encontre os melhores produtos farmacêuticos" />

<!-- Search and Filter -->
<div class="row g-3 mb-4">
  <div class="col-md-6">
    <div class="input-group">
      <span class="input-group-text bg-white border-end-0">
        <i class="bi bi-search text-muted"></i>
      </span>
      <input [(ngModel)]="search" (ngModelChange)="onSearch()" type="text" class="form-control border-start-0" placeholder="Buscar produtos..." />
    </div>
  </div>
</div>

<!-- Loading -->
@if (loading()) {
  <div class="row g-4">
    @for (_ of [1,2,3,4,5,6,7,8]; track $index) {
      <div class="col-sm-6 col-lg-4 col-xl-3">
        <div class="card placeholder-glow">
          <div class="card-body">
            <div class="bg-light rounded mb-3" style="height:120px"></div>
            <div class="placeholder col-8 mb-2"></div>
            <div class="placeholder col-4"></div>
          </div>
        </div>
      </div>
    }
  </div>
} @else {
  <!-- Products Grid -->
  <div class="row g-4">
    @for (product of products(); track product.id) {
      <div class="col-sm-6 col-lg-4 col-xl-3">
        <app-product-card
          [product]="product"
          [showAddToCart]="true"
          (addToCart)="onAddToCart($event)" />
      </div>
    } @empty {
      <div class="col-12">
        <div class="text-center py-5 text-muted">
          <i class="bi bi-search" style="font-size:2rem"></i>
          <div class="mt-2">Nenhum produto encontrado.</div>
        </div>
      </div>
    }
  </div>
}
